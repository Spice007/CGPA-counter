<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Spice CGPA Pro</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons & Styling -->
    <link rel="stylesheet" href="src/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Glowing Background Elements */
        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(16, 185, 129, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }
        .orb-left { top: -100px; left: -100px; }
        .orb-right { bottom: -100px; right: -100px; }

        .container {
            width: 100%;
            max-width: 450px;
            z-index: 1;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .logo-box {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            width: 40px;
            height: 40px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .input-icon i {
            width: 18px;
            height: 18px;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #10b981;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .input-right-icon {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            transition: color 0.2s;
        }

        .input-right-icon:hover {
            color: #f8fafc;
        }

        .input-right-icon i {
            width: 18px;
            height: 18px;
        }

        .submit-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1.25rem;
            border: none;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-lock-icon {
            width: 18px;
            height: 18px;
        }

        .btn-arrow-icon {
            width: 18px;
            height: 18px;
            transition: transform 0.2s;
        }

        .submit-btn:hover .btn-arrow-icon {
            transform: translateX(4px);
        }

        .alert-box {
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .alert-box i {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #f8fafc;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="glow-orb orb-left"></div>
    <div class="glow-orb orb-right"></div>

    <div class="container">
        <div class="card">
            <div class="logo-wrap">
                <div class="logo-box">
                    <i data-lucide="graduation-cap" style="width: 22px; height: 22px;"></i>
                </div>
                <div class="logo-text">Spice CGPA Pro</div>
            </div>

            <h2>Reset Password</h2>
            <p class="subtitle" id="page-subtitle">Enter your new secure password below to regain access.</p>

            <div id="error-box" class="alert-box alert-error" style="display: none;">
                <i data-lucide="alert-circle"></i>
                <span id="error-text"></span>
            </div>

            <div id="success-box" class="alert-box alert-success" style="display: none;">
                <i data-lucide="check-circle"></i>
                <span id="success-text"></span>
            </div>

            <form id="reset-form">
                <!-- New Password -->
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="lock"></i></span>
                        <input type="password" id="password" placeholder="••••••••••••••" required minlength="6">
                        <button type="button" class="input-right-icon toggle-pw" id="toggle-pw-1" aria-label="Toggle password">
                            <i data-lucide="eye" id="eye-1"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="shield-check"></i></span>
                        <input type="password" id="confirm-password" placeholder="••••••••••••••" required minlength="6">
                        <button type="button" class="input-right-icon toggle-pw" id="toggle-pw-2" aria-label="Toggle password">
                            <i data-lucide="eye" id="eye-2"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <div class="btn-left">
                        <i data-lucide="key-round" class="btn-lock-icon"></i>
                        <span>Update Password</span>
                    </div>
                    <i data-lucide="arrow-right" class="btn-arrow-icon"></i>
                </button>
            </form>

            <a href="login.html" class="back-link" id="back-link">Back to Sign In</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. Get Token from URL Query Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const form = document.getElementById('reset-form');
        const subtitle = document.getElementById('page-subtitle');
        const errorBox = document.getElementById('error-box');
        const errorText = document.getElementById('error-text');

        if (!token) {
            form.style.display = 'none';
            subtitle.style.display = 'none';
            errorText.textContent = 'Invalid or missing password reset token. Please request a new recovery link.';
            errorBox.style.display = 'flex';
        }

        // 2. Password Visibility Toggles
        const setupVisibilityToggle = (btnId, inputId, eyeId) => {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            let visible = false;

            btn.addEventListener('click', () => {
                visible = !visible;
                input.type = visible ? 'text' : 'password';
                eye.setAttribute('data-lucide', visible ? 'eye-off' : 'eye');
                lucide.createIcons();
            });
        };

        setupVisibilityToggle('toggle-pw-1', 'password', 'eye-1');
        setupVisibilityToggle('toggle-pw-2', 'confirm-password', 'eye-2');

        // 3. Form Submission Handling
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submit-btn');
            const successBox = document.getElementById('success-box');
            const successText = document.getElementById('success-text');

            // Reset UI States
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            // Validate Passwords Match
            if (password !== confirmPassword) {
                errorText.textContent = 'Passwords do not match. Please verify.';
                errorBox.style.display = 'flex';
                return;
            }

            const origHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = `
                <div class="btn-left">
                    <i data-lucide="loader-2" style="animation:spin 1s linear infinite; stroke-width: 2.5px;"></i>
                    <span>Updating password...</span>
                </div>
                <div style="width: 26px;"></div>
            `;
            submitBtn.disabled = true;
            lucide.createIcons();

            try {
                const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') ? 'http://localhost:5000/api' : 'https://cgpa-counter-production.up.railway.app/api';
                const response = await fetch(`${apiBase}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    form.style.display = 'none';
                    subtitle.style.display = 'none';
                    
                    let countdown = 3;
                    successText.innerHTML = `Password updated successfully! Redirecting you to login in <span id="countdown">${countdown}</span>s...`;
                    successBox.style.display = 'flex';
                    
                    const interval = setInterval(() => {
                        countdown--;
                        const countEl = document.getElementById('countdown');
                        if (countEl) countEl.textContent = countdown;
                        if (countdown <= 0) {
                            clearInterval(interval);
                            window.location.href = 'login.html';
                        }
                    }, 1000);
                } else {
                    errorText.textContent = data.message || 'Failed to reset password. Please try again.';
                    errorBox.style.display = 'flex';
                    submitBtn.innerHTML = origHTML;
                    submitBtn.disabled = false;
                    lucide.createIcons();
                }
            } catch (err) {
                console.error(err);
                errorText.textContent = 'Cannot reach server. Please check your internet connection.';
                errorBox.style.display = 'flex';
                submitBtn.innerHTML = origHTML;
                submitBtn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
