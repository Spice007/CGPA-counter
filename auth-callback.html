<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing you in... | SpiceCGPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
        p  { color: #94a3b8; font-size: 0.95rem; }
        .error-box {
            margin-top: 2rem;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 0.75rem;
            padding: 1rem 1.5rem;
            color: #fca5a5;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Signing you in…</h2>
        <p>Please wait, setting up your session.</p>
        <div class="error-box" id="err"></div>
    </div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const userStr = params.get('user');
            const error = params.get('error');

            if (error || !token || !userStr) {
                const box = document.getElementById('err');
                box.style.display = 'block';
                box.textContent = 'Google sign-in failed. Redirecting back to login…';
                setTimeout(() => { window.location.href = 'login.html'; }, 2500);
                return;
            }

            try {
                const user = JSON.parse(decodeURIComponent(userStr));
                user.token = token;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                // Redirect to the main dashboard
                window.location.href = 'index.html';
            } catch (e) {
                const box = document.getElementById('err');
                box.style.display = 'block';
                box.textContent = 'Could not parse session data. Redirecting to login…';
                setTimeout(() => { window.location.href = 'login.html'; }, 2500);
            }
        })();
    </script>
</body>
</html>
